<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Griffix Racing | Motocross Graphics in the Wild</title>
  <meta name="description" content="See Griffix Racing graphics kits in action — customer builds, race bikes, and enduro machines from around Australia and beyond.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Archivo+Narrow:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: { DEFAULT: '#2B2B2B', 700: '#353535', 800: '#1E1E1E', 900: '#141414' },
            orange: { DEFAULT: '#FF6B00', dark: '#e55a00' },
            tan: { DEFAULT: '#A39171', dark: '#7D6E56' }
          },
          fontFamily: {
            display: ['Oswald', 'sans-serif'],
            body: ['Archivo Narrow', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    /* ── Feed frame ─────────────────────────────────────────────────── */
    .fb-frame {
      position: relative;
      background: #111;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(163,145,113,.18),
        0 4px 12px rgba(0,0,0,.6),
        0 24px 64px rgba(0,0,0,.5);
    }

    /* orange corner accents */
    .fb-frame::before,
    .fb-frame::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      z-index: 10;
      pointer-events: none;
    }
    .fb-frame::before {
      top: 0; left: 0;
      border-top: 2px solid #FF6B00;
      border-left: 2px solid #FF6B00;
    }
    .fb-frame::after {
      bottom: 0; right: 0;
      border-bottom: 2px solid #FF6B00;
      border-right: 2px solid #FF6B00;
    }

    .fb-frame-inner::before,
    .fb-frame-inner::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      z-index: 10;
      pointer-events: none;
    }
    .fb-frame-inner::before {
      top: 0; right: 0;
      border-top: 2px solid #FF6B00;
      border-right: 2px solid #FF6B00;
    }
    .fb-frame-inner::after {
      bottom: 0; left: 0;
      border-bottom: 2px solid #FF6B00;
      border-left: 2px solid #FF6B00;
    }

    .fb-frame iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── Loading shimmer ─────────────────────────────────────────────── */
    .fb-loader {
      position: absolute;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 5;
      transition: opacity .4s;
    }
    .fb-loader.hidden { opacity: 0; pointer-events: none; }

    .fb-loader-logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid rgba(163,145,113,.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fb-loader-bar {
      width: 120px;
      height: 3px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }
    .fb-loader-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: #FF6B00;
      border-radius: 2px;
      animation: load-slide 1.2s ease-in-out infinite;
    }
    @keyframes load-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Side label ──────────────────────────────────────────────────── */
    .side-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .2em;
      color: rgba(163,145,113,.4);
      user-select: none;
    }

    /* ── CTA button ──────────────────────────────────────────────────── */
    .fb-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: #1877F2;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .08em;
      border-radius: 3px;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
    }
    .fb-cta:hover { opacity: .9; transform: translateY(-1px); }
    .fb-cta:active { transform: translateY(0); }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- ── Page Hero ─────────────────────────────────────────────────────────── -->
<section class="page-hero topo" style="padding-top:64px;">
  <div class="absolute inset-0" style="background:radial-gradient(ellipse 70% 100% at 50% 120%, rgba(163,145,113,.12) 0%, transparent 60%);"></div>
  <div class="relative z-10 max-w-7xl mx-auto px-6 py-14">
    <div class="label mb-3">Built in the Dirt</div>
    <h1 class="font-display font-bold text-white" style="font-size:clamp(36px,6vw,72px); letter-spacing:-.03em; line-height:.95;">GALLERY</h1>
    <p class="text-[#666] mt-3" style="font-family:'Archivo Narrow',sans-serif; font-size:15px;">Our designs. Your builds. Out in the wild. — Live from our Facebook page.</p>
  </div>
</section>

<!-- ── Facebook Feed ──────────────────────────────────────────────────────── -->
<section style="background:#0d0d0d; padding:64px 0 96px;">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Section header -->
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:40px;">
      <div style="flex:1; height:1px; background:linear-gradient(to right, rgba(163,145,113,.25), transparent);"></div>
      <div style="display:flex; align-items:center; gap:10px;">
        <!-- Facebook icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        <span class="font-display text-[#A39171]" style="font-size:12px; letter-spacing:.15em; font-weight:500;">LIVE FEED</span>
      </div>
      <div style="flex:1; height:1px; background:linear-gradient(to left, rgba(163,145,113,.25), transparent);"></div>
    </div>

    <!-- Main layout -->
    <div style="display:flex; gap:32px; align-items:flex-start;">

      <!-- Side label (desktop only) -->
      <div class="side-label hidden lg:flex" style="padding-top:40px;">GRIFFIX RACING — FACEBOOK</div>

      <!-- Feed frame -->
      <div style="flex:1; min-width:0;">
        <div class="fb-frame fb-frame-inner" style="position:relative;">

          <!-- Loading state -->
          <div class="fb-loader" id="fb-loader">
            <div class="fb-loader-logo">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(163,145,113,.5)"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </div>
            <div class="fb-loader-bar"></div>
            <span style="font-family:'Archivo Narrow',sans-serif; font-size:12px; color:#444;">Loading feed…</span>
          </div>

          <!-- Facebook Page Plugin iframe -->
          <iframe
            id="fb-iframe"
            src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2FGriffixRacing%2F&tabs=timeline%2Cphotos&width=1100&height=900&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=false&lazy=true"
            height="900"
            scrolling="yes"
            frameborder="0"
            allowfullscreen="true"
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
            style="min-height:900px;"
            onload="document.getElementById('fb-loader').classList.add('hidden')"
          ></iframe>
        </div>

        <!-- Footer bar -->
        <div style="margin-top:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
          <p style="font-family:'Archivo Narrow',sans-serif; font-size:13px; color:#444;">
            Photos update automatically as we post new designs and customer builds.
          </p>
          <a href="https://www.facebook.com/GriffixRacing/" target="_blank" rel="noopener" class="fb-cta">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            FOLLOW ON FACEBOOK
          </a>
        </div>
      </div>

      <!-- Side label right (desktop only) -->
      <div class="side-label hidden lg:flex" style="padding-top:40px;">OUR DESIGNS — YOUR BUILDS</div>
    </div>

  </div>
</section>

<div id="footer-placeholder"></div>

<script src="/js/reveal.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
